$schema: http://json-schema.org/draft-04/schema#
id: proteomics_assay
title: proteomics_assay
type: object
namespace: https://commons.heartdata.baker.edu.au/
category: experimental_methods
program: '*'
project: '*'
description: 'Details about the methods that produced the proteomics data

  '
submittable: true
validators: null
systemProperties:
- id
- project_id
- state
- created_datetime
- updated_datetime
uniqueKeys:
- - id
- - project_id
  - submitter_id
required:
- submitter_id
- type
links:
- name: samples
  backref: proteomics_assays
  label: part_of
  target_type: sample
  multiplicity: one_to_many
  required: true
properties:
  $ref: _definitions.yaml#/ubiquitous_properties
  samples:
    $ref: _definitions.yaml#/to_many
  assay_id:
    description: An identifier for the assay or experiemnt performed on the sample
    type: string
  assay_description:
    description: A description of the type of assay used.
    type: string
  protein_names:
    description: A list of all proteins assayed in this method
    type: array
    items:
      type: string
  instrument_model:
    description: >
      Full make/model of the mass spectrometer as reported by the vendor, e.g.
      "Thermo Q Exactive HF-X", "SCIEX TripleTOF 6600", "Bruker timsTOF Pro".
    type: string
  instrument_manufacturer:
    description: Instrument vendor, e.g. "Thermo Fisher Scientific", "SCIEX", "Bruker".
    type: string
  instrument_serial_number:
    description: Serial number of the specific instrument used, if known (provenance).
    type: string
  instrument_rrid:
    description: >
      Research Resource Identifier for the instrument model, format "RRID:SCR_xxxxxxx".
    type: string
    pattern: ^RRID:SCR_[0-9]+$
  ionization_type:
    description: The ion source used to generate gas-phase ions before mass analysis.
    $ref: _definitions.yaml#/enum_ionization_type
  mass_analyzer_type:
    description: >
      The primary mass analyzer separating ions by m/z. For hybrid instruments, record
      the main analyzer here and give the full configuration in instrument_model.
    $ref: _definitions.yaml#/enum_mass_analyzer_type
  detector_type:
    description: The ion detector used by the instrument, if reported.
    $ref: _definitions.yaml#/enum_detector_type
  dissociation_method:
    description: >
      Fragmentation/activation method for tandem MS. HCD is recorded as beam-type
      collision-induced dissociation. Leave blank for MS1-only acquisition.
    $ref: _definitions.yaml#/enum_dissociation_method
  acquisition_mode:
    description: >
      How MS/MS spectra were acquired. Data-dependent acquisition selects the most
      intense precursors per cycle; data-independent acquisition fragments all
      precursors in fixed m/z windows; reaction-monitoring modes are targeted.
    $ref: _definitions.yaml#/enum_acquisition_mode
  chromatography_type:
    description: >
      Chromatographic separation coupled to the MS, or "none / direct infusion".
    $ref: _definitions.yaml#/enum_chromatography_type
  chromatography_instrument:
    description: LC/GC system make and model, e.g. "Thermo EASY-nLC 1200".
    type: string
  column_type:
    description: >
      Analytical column description, e.g. "C18, 25 cm x 75 um, 1.9 um particles".
    type: string
  digestion_enzyme:
    description: Protease used to digest proteins into peptides (bottom-up proteomics).
    $ref: _definitions.yaml#/enum_digestion_enzyme
  number_of_missed_cleavages_allowed:
    description: Maximum number of missed cleavages permitted in the database search, e.g. 2.
    type: integer
    minimum: 0
  labeling_strategy:
    description: >
      Sample labeling / quantification chemistry used at the bench (label-free, tandem
      mass tag, iTRAQ, SILAC).
    $ref: _definitions.yaml#/enum_quantification_method
  quantification_method:
    description: >
      How protein/peptide abundances were derived. Usually matches labeling_strategy,
      but may differ, e.g. label-free acquisition quantified by iBAQ.
    $ref: _definitions.yaml#/enum_quantification_method
  search_engine:
    description: Software used for peptide/protein identification.
    $ref: _definitions.yaml#/enum_search_engine
  search_engine_version:
    description: Version string of the search engine, e.g. "2.4.1.0".
    type: string
  protein_database:
    description: >
      Sequence database searched, e.g. "UniProt human reference proteome (UP000005640)".
    type: string
  protein_database_version:
    description: Release/version of the sequence database, e.g. "2024_03".
    type: string
  fixed_modifications:
    description: >
      Fixed modifications applied in the search, preferring Unimod names, e.g.
      ["Carbamidomethyl (C)"].
    type: array
    items:
      type: string
  variable_modifications:
    description: >
      Variable modifications in the search, preferring Unimod names, e.g.
      ["Oxidation (M)", "Acetyl (Protein N-term)"].
    type: array
    items:
      type: string
  precursor_mass_tolerance:
    description: Precursor (MS1) mass tolerance value used in the search, e.g. 10.
    type: number
  precursor_mass_tolerance_unit:
    description: Unit for precursor_mass_tolerance, e.g. "ppm" or "Da".
    type: string
  fragment_mass_tolerance:
    description: Fragment (MS2) mass tolerance value used in the search, e.g. 0.02.
    type: number
  fragment_mass_tolerance_unit:
    description: Unit for fragment_mass_tolerance, e.g. "Da" or "ppm".
    type: string
  psm_fdr_threshold:
    description: >
      Peptide-spectrum-match level false discovery rate applied, as a fraction
      (0.01 = 1%).
    type: number
    minimum: 0
    maximum: 1
  peptide_fdr_threshold:
    description: Peptide-level false discovery rate applied, as a fraction.
    type: number
    minimum: 0
    maximum: 1
  protein_fdr_threshold:
    description: >
      Protein-level false discovery rate applied, as a fraction. HUPO HPP guidelines
      expect 0.01 (1%) or lower.
    type: number
    minimum: 0
    maximum: 1
  number_of_fractions:
    description: >
      Number of offline fractions per sample, e.g. from high-pH reversed-phase
      fractionation; 1 if unfractionated.
    type: integer
    minimum: 0
  data_release:
    description: Data release version e.g. 0.1.1
    type: string
  data_release_date:
    description: Date of data release in the format YYYY-MM-DD
    type: string
    pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
additionalProperties: false
